name: Build and Release

on:
  push:
    branches: [ main ]
    tags:
      - 'v*'
  pull_request:
    branches: [ main ]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
    - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6  # v1.16.1
    - name: Cache cargo deps (cli)
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4.3.0
      with:
        path: |
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          cli/target/
        key: cargo-cli-${{ runner.os }}-${{ hashFiles('cli/Cargo.lock') }}
        restore-keys: |
          cargo-cli-${{ runner.os }}-
    - run: cd cli && cargo build --verbose

  test:
    # Fast tests: 9 unit tests + 2 fixture-walk integration tests. Runs in
    # well under a minute including the OVMF.fd download (which is cached
    # across runs so subsequent invocations are sub-second).
    #
    # The slow round-trip docker-based regen test (tests/regen.rs) is gated
    # behind `--ignored` and runs only in the `regen` job below, which is
    # manual / on-demand.
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
    - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6  # v1.16.1
    - name: Cache cargo deps (lib)
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4.3.0
      with:
        path: |
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          target/
        key: cargo-lib-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
        restore-keys: |
          cargo-lib-${{ runner.os }}-
    - name: Cache OVMF.fd
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4.3.0
      with:
        path: tests/fixtures/OVMF.fd
        # Key on the fetch script's content so changes (new pin / new URL)
        # invalidate the cache automatically.
        key: ovmf-fd-${{ hashFiles('tests/fetch_ovmf.sh') }}
    - name: Fetch OVMF.fd
      run: ./tests/fetch_ovmf.sh
    - name: Run unit + integration tests
      run: cargo test --release

  regen:
    # Slow round-trip test: builds the patched-QEMU Docker image and runs
    # `--create-acpi-tables` against each fixture, asserting bytes match.
    # Runs only on manual dispatch to avoid burning ~5 min on every PR.
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1
    - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6  # v1.16.1
    - uses: docker/setup-buildx-action@8d2750c68a42422c14e847fe6c8ac0403b4cbd6f  # v3.12.0
    - name: Cache cargo deps (lib)
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4.3.0
      with:
        path: |
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          target/
        key: cargo-lib-${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
        restore-keys: |
          cargo-lib-${{ runner.os }}-
    - name: Cache OVMF.fd
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4.3.0
      with:
        path: tests/fixtures/OVMF.fd
        key: ovmf-fd-${{ hashFiles('tests/fetch_ovmf.sh') }}
    - name: Fetch OVMF.fd
      run: ./tests/fetch_ovmf.sh
    - name: Run round-trip regen tests
      # `--ignored` runs the gated tests/regen.rs. The Canonical-defaults
      # fixture uses `accel: "kvm"` and is auto-skipped on KVM-less runners
      # (GitHub Actions standard hosted runners don't expose /dev/kvm).
      run: cargo test --release --test regen -- --ignored --nocapture

  release:
    needs: build
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    steps:
    - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4.3.1

    - uses: actions-rust-lang/setup-rust-toolchain@46268bd060767258de96ed93c1251119784f2ab6  # v1.16.1

    - name: Cache cargo deps (cli)
      uses: actions/cache@0057852bfaa89a56745cba8c7296529d2fc39830  # v4.3.0
      with:
        path: |
          ~/.cargo/registry/index/
          ~/.cargo/registry/cache/
          ~/.cargo/git/db/
          cli/target/
        key: cargo-cli-${{ runner.os }}-${{ hashFiles('cli/Cargo.lock') }}
        restore-keys: |
          cargo-cli-${{ runner.os }}-

    - name: Build release
      run: cd cli && cargo build --release

    - name: Create Release
      env:
        GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release create "${GITHUB_REF_NAME}" \
          cli/target/release/tdx-measure \
          --title "${GITHUB_REF_NAME}" \
          --generate-notes
